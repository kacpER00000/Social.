version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: social_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: social_db
      POSTGRES_USER: social_user
      POSTGRES_PASSWORD: super_secret_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  app:
    build: .
    container_name: social_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      DB_URL: jdbc:postgresql://db:5432/social_db
      DB_USERNAME: social_user
      DB_PASSWORD: super_secret_password
      JWT_SECRET_KEY: wGhN8vF5K7pR3tY9xL2mQ4nV6sU8jE0bC5aH1dZ7fO9kI3wX6yT2qP5rM4gN8hJ0
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_PROPERTIES_HIBERNATE_HBM2DDL_CREATE_NAMESPACES: true

volumes:
  postgres_data:
